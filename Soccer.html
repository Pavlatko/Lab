<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Fotbal - PavlatkoLabs</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        canvas { display: block; margin: 0 auto; background: #38761d; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: white; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 10;
        }
        button { 
            padding: 20px 40px; font-size: 24px; cursor: pointer; 
            background: #e67e22; border: none; color: white; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 1.2em; font-weight: bold;">PavlatkoLabs Retro Cup</div>
    <div id="score">Modří: 0 | Červení: 0</div>
    <div id="turn" style="color: #3498db;">Na tahu: MODŘÍ</div>
</div>

<div id="overlay">
    <h1 id="status-text">Retro Fotbal</h1>
    <p id="sub-text">Připrav se na výkop!</p>
    <button id="start-btn">HRAŤ</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('start-btn');
const overlay = document.getElementById('overlay');
const statusText = document.getElementById('status-text');
const subText = document.getElementById('sub-text');

let gameState = {
    ball: { x: 0, y: 0, vx: 0, vy: 0, radius: 10 },
    holes: [],
    players: [], // vizuální postavy
    score: [0, 0], // 0: Modří, 1: Červení
    currentPlayer: 0, 
    isPaused: true,
    lastTime: 0
};

const FRICTION = 0.97;
const SENSITIVITY = 0.06;

function initLevel() {
    const w = canvas.width;
    const h = canvas.height;
    
    // Dírky (pasti a branky)
    // Branka nahoře (index 0) a dole (index 1)
    gameState.holes = [
        { x: w/2, y: 50, type: 'goal', id: 0 }, 
        { x: w/2, y: h-50, type: 'goal', id: 1 },
        
        // Blokování krajů v horní polovině (pasti)
        { x: 35, y: h*0.2, type: 'trap' },
        { x: w-35, y: h*0.2, type: 'trap' },
        { x: 35, y: h*0.4, type: 'trap' },
        { x: w-35, y: h*0.4, type: 'trap' },
        
        // Dírky vedle horní branky (proti švinlování)
        { x: w/2 - 80, y: 60, type: 'trap' },
        { x: w/2 + 80, y: 60, type: 'trap' },

        // Pasti uprostřed hřiště (rozmístěné kolem středu)
        { x: w*0.25, y: h*0.5, type: 'trap' },
        { x: w*0.75, y: h*0.5, type: 'trap' },

        // Blokování krajů v dolní polovině
        { x: 35, y: h*0.7, type: 'trap' },
        { x: w-35, y: h*0.7, type: 'trap' }
    ];

    // Rozmístění statických hráčů (jen pro vizuál)
    gameState.players = [
        { x: w/2, y: 100, team: 'top' }, // Brankář nahoře
        { x: w/2, y: h-100, team: 'bottom' }, // Brankář dole
        { x: w*0.3, y: h*0.25, team: 'top' },
        { x: w*0.7, y: h*0.25, team: 'top' },
        { x: w*0.5, y: h*0.35, team: 'bottom' },
        { x: w*0.2, y: h*0.65, team: 'bottom' },
        { x: w*0.8, y: h*0.65, team: 'bottom' }
    ];
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initLevel();
    resetBall();
}

function resetBall() {
    gameState.ball.x = canvas.width / 2;
    gameState.ball.y = canvas.height / 2; // Vždy začíná uprostřed
    gameState.ball.vx = 0;
    gameState.ball.vy = 0;
}

function updateUI() {
    const p1Color = "#3498db";
    const p2Color = "#e74c3c";
    document.getElementById('score').innerHTML = `<span style="color:${p1Color}">Modří: ${gameState.score[0]}</span> | <span style="color:${p2Color}">Červení: ${gameState.score[1]}</span>`;
    const turnDiv = document.getElementById('turn');
    turnDiv.innerText = `Na tahu: ${gameState.currentPlayer === 0 ? 'MODŘÍ' : 'ČERVENÍ'}`;
    turnDiv.style.color = gameState.currentPlayer === 0 ? p1Color : p2Color;
}

let tiltX = 0, tiltY = 0;
window.addEventListener('deviceorientation', (e) => {
    // Pokud hraje Hráč 2 (Červení), musíme invertovat ovládání, protože on "otočil" telefon v ruce? 
    // Nebo předpokládáme, že si ho jen předají a dívají se stejně. 
    // Pro zjednodušení: oba se dívají na displej stejně, jen barvy se prohodí.
    tiltX = e.gamma * SENSITIVITY;
    tiltY = e.beta * SENSITIVITY;
});

function startCountdown(seconds, msg, subMsg) {
    gameState.isPaused = true;
    overlay.style.display = 'flex';
    statusText.innerText = msg;
    subText.innerText = subMsg;
    startBtn.style.display = 'none';
    
    let count = seconds;
    let timer = setInterval(() => {
        if (count > 0) {
            statusText.innerText = count;
            count--;
        } else {
            clearInterval(timer);
            statusText.innerText = "HRAJ!";
            setTimeout(() => {
                overlay.style.display = 'none';
                gameState.isPaused = false;
            }, 500);
        }
    }, 1000);
}

function update(time) {
    const dt = (time - gameState.lastTime) / 16.67;
    gameState.lastTime = time;

    if (!gameState.isPaused) {
        gameState.ball.vx += tiltX * dt;
        gameState.ball.vy += tiltY * dt;
        gameState.ball.vx *= FRICTION;
        gameState.ball.vy *= FRICTION;
        gameState.ball.x += gameState.ball.vx * dt;
        gameState.ball.y += gameState.ball.vy * dt;

        // Mantinely
        if (gameState.ball.x < 15) { gameState.ball.x = 15; gameState.ball.vx *= -0.4; }
        if (gameState.ball.x > canvas.width - 15) { gameState.ball.x = canvas.width - 15; gameState.ball.vx *= -0.4; }
        if (gameState.ball.y < 15) { gameState.ball.y = 15; gameState.ball.vy *= -0.4; }
        if (gameState.ball.y > canvas.height - 15) { gameState.ball.y = canvas.height - 15; gameState.ball.vy *= -0.4; }

        // Kolize s dírkami
        gameState.holes.forEach(hole => {
            const dx = gameState.ball.x - hole.x;
            const dy = gameState.ball.y - hole.y;
            if (Math.sqrt(dx*dx + dy*dy) < 18) {
                if (hole.type === 'goal') {
                    if ((gameState.currentPlayer === 0 && hole.id === 0) || (gameState.currentPlayer === 1 && hole.id === 1)) {
                        // GÓL soupeři (horní dírka z pohledu hráče)
                        gameState.score[gameState.currentPlayer]++;
                        saveGame(); updateUI();
                        resetBall();
                        startCountdown(3, "GÓÓÓL!", "Skvělá trefa!");
                    } else {
                        // VLASTNÍ GÓL (dolní dírka)
                        const opponent = gameState.currentPlayer === 0 ? 1 : 0;
                        gameState.score[opponent]++;
                        gameState.currentPlayer = opponent;
                        saveGame(); updateUI();
                        resetBall();
                        startCountdown(5, "VLASTNÍ GÓL!", "To zabolelo... Předdej telefon.");
                    }
                } else {
                    // PAST - střídání
                    gameState.currentPlayer = gameState.currentPlayer === 0 ? 1 : 0;
                    saveGame(); updateUI();
                    resetBall();
                    startCountdown(5, "ZTRÁTA!", "Míče se zmocnil soupeř. Předej telefon.");
                }
            }
        });
    }

    draw();
    requestAnimationFrame(update);
}

function drawPlayer(x, y, color, isBackwards) {
    ctx.save();
    ctx.translate(x, y);
    if (isBackwards) ctx.rotate(Math.PI);

    // Tělo/Ramena
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(0, 5, 15, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "black"; ctx.lineWidth = 1; ctx.stroke();

    // Hlava
    ctx.fillStyle = "#ffdbac";
    ctx.beginPath();
    ctx.arc(0, -5, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Tráva a čáry
    ctx.strokeStyle = "white"; ctx.lineWidth = 3;
    ctx.strokeRect(10, 10, canvas.width-20, canvas.height-20);
    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height/2, 50, 0, Math.PI*2);
    ctx.moveTo(10, canvas.height/2); ctx.lineTo(canvas.width-10, canvas.height/2);
    ctx.stroke();

    // Dírky
    gameState.holes.forEach(hole => {
        ctx.fillStyle = "#111";
        ctx.beginPath(); ctx.arc(hole.x, hole.y, 20, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = hole.type === 'goal' ? "white" : "#222";
        ctx.lineWidth = 2; ctx.stroke();
    });

    // Hráči (dynamické barvy podle toho, kdo hraje)
    const myTeamColor = gameState.currentPlayer === 0 ? "#3498db" : "#e74c3c";
    const enemyTeamColor = gameState.currentPlayer === 0 ? "#e74c3c" : "#3498db";

    gameState.players.forEach(p => {
        const isMyTeam = (gameState.currentPlayer === 0 && p.team === 'bottom') || (gameState.currentPlayer === 1 && p.team === 'top');
        const color = isMyTeam ? myTeamColor : enemyTeamColor;
        // Pokud je to můj tým, kouká nahoru (zády k nám), pokud soupeř, kouká dolů
        drawPlayer(p.x, p.y, color, isMyTeam);
    });

    // Míč
    ctx.fillStyle = "white";
    ctx.beginPath(); ctx.arc(gameState.ball.x, gameState.ball.y, gameState.ball.radius, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "black"; ctx.lineWidth = 1; ctx.stroke();
}

// Ukládání postupu
function saveGame() {
    localStorage.setItem('retroFotbal_save', JSON.stringify({
        score: gameState.score,
        currentPlayer: gameState.currentPlayer,
        ballX: gameState.ball.x,
        ballY: gameState.ball.y
    }));
}

function loadGame() {
    const saved = localStorage.getItem('retroFotbal_save');
    if (saved) {
        const data = JSON.parse(saved);
        gameState.score = data.score;
        gameState.currentPlayer = data.currentPlayer;
        gameState.ball.x = data.ballX;
        gameState.ball.y = data.ballY;
        updateUI();
        return true;
    }
    return false;
}

startBtn.addEventListener('click', () => {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(state => { if (state === 'granted') run(); });
    } else { run(); }
});

function run() {
    if (!loadGame()) resetBall();
    updateUI();
    startCountdown(3, "PŘIPRAV SE", "Drž telefon vodorovně");
    requestAnimationFrame(update);
}

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
