<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Kuličkový Fotbal - PavlatkoLabs</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; touch-action: none; }
        canvas { display: block; margin: 0 auto; background: #2d5a27; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: white; pointer-events: none; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 10;
        }
        button { 
            padding: 15px 30px; font-size: 20px; cursor: pointer; 
            background: #4CAF50; border: none; color: white; border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="score">Hráč 1: 0 | Hráč 2: 0</div>
    <div id="turn">Na tahu: Hráč 1</div>
</div>

<div id="overlay">
    <h1 id="status-text">Retro Fotbal</h1>
    <p id="sub-text">Klikni pro start (povolení senzorů)</p>
    <button id="start-btn">START</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('start-btn');
const overlay = document.getElementById('overlay');
const statusText = document.getElementById('status-text');
const subText = document.getElementById('sub-text');

// Herní stav
let gameState = {
    ball: { x: 0, y: 0, vx: 0, vy: 0, radius: 12 },
    holes: [],
    score: [0, 0],
    currentPlayer: 0, // 0 = Hráč 1, 1 = Hráč 2
    isPaused: true,
    countdown: 0,
    lastTime: 0
};

// Konfigurace
const FRICTION = 0.98;
const ACCEL_SENSITIVITY = 0.05;

function initHoles() {
    const w = canvas.width;
    const h = canvas.height;
    gameState.holes = [
        { x: w/2, y: 60, type: 'goal', owner: 1 }, // Cíl pro Hráče 1 (u brankáře nahoře)
        { x: w/2, y: h-60, type: 'goal', owner: 0 }, // Cíl pro Hráče 2 (u brankáře dole)
        // Pasti (vypadnutí míče)
        { x: w*0.2, y: h*0.3, type: 'trap' },
        { x: w*0.8, y: h*0.3, type: 'trap' },
        { x: w*0.5, y: h*0.5, type: 'trap' },
        { x: w*0.2, y: h*0.7, type: 'trap' },
        { x: w*0.8, y: h*0.7, type: 'trap' }
    ];
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initHoles();
    if (gameState.ball.x === 0) resetBall();
}

function resetBall() {
    gameState.ball.x = canvas.width / 2;
    gameState.ball.y = gameState.currentPlayer === 0 ? canvas.height - 100 : 100;
    gameState.ball.vx = 0;
    gameState.ball.vy = 0;
}

// Ukládání postupu
function saveGame() {
    localStorage.setItem('retroFotbal_save', JSON.stringify({
        score: gameState.score,
        currentPlayer: gameState.currentPlayer,
        ballX: gameState.ball.x,
        ballY: gameState.ball.y
    }));
}

function loadGame() {
    const saved = localStorage.getItem('retroFotbal_save');
    if (saved) {
        const data = JSON.parse(saved);
        gameState.score = data.score;
        gameState.currentPlayer = data.currentPlayer;
        gameState.ball.x = data.ballX;
        gameState.ball.y = data.ballY;
        updateUI();
        return true;
    }
    return false;
}

function updateUI() {
    document.getElementById('score').innerText = `Hráč 1: ${gameState.score[0]} | Hráč 2: ${gameState.score[1]}`;
    document.getElementById('turn').innerText = `Na tahu: Hráč ${gameState.currentPlayer + 1}`;
}

// Senzory
let tiltX = 0, tiltY = 0;
window.addEventListener('deviceorientation', (e) => {
    tiltX = e.gamma * ACCEL_SENSITIVITY;
    tiltY = e.beta * ACCEL_SENSITIVITY;
});

function startCountdown(seconds, callback) {
    gameState.isPaused = true;
    gameState.countdown = seconds;
    overlay.style.display = 'flex';
    startBtn.style.display = 'none';
    
    let timer = setInterval(() => {
        gameState.countdown--;
        statusText.innerText = gameState.countdown > 0 ? gameState.countdown : "HRAJ!";
        if (gameState.countdown <= 0) {
            clearInterval(timer);
            setTimeout(() => {
                overlay.style.display = 'none';
                gameState.isPaused = false;
                if(callback) callback();
            }, 500);
        }
    }, 1000);
}

function update(time) {
    const dt = (time - gameState.lastTime) / 16.67; // Delta Time normalizovaný na 60fps
    gameState.lastTime = time;

    if (!gameState.isPaused) {
        // Fyzika s Delta Time
        gameState.ball.vx += tiltX * dt;
        gameState.ball.vy += tiltY * dt;
        gameState.ball.vx *= FRICTION;
        gameState.ball.vy *= FRICTION;
        gameState.ball.x += gameState.ball.vx * dt;
        gameState.ball.y += gameState.ball.vy * dt;

        // Kolize se stěnami
        if (gameState.ball.x < gameState.ball.radius) { gameState.ball.x = gameState.ball.radius; gameState.ball.vx *= -0.5; }
        if (gameState.ball.x > canvas.width - gameState.ball.radius) { gameState.ball.x = canvas.width - gameState.ball.radius; gameState.ball.vx *= -0.5; }
        if (gameState.ball.y < gameState.ball.radius) { gameState.ball.y = gameState.ball.radius; gameState.ball.vy *= -0.5; }
        if (gameState.ball.y > canvas.height - gameState.ball.radius) { gameState.ball.y = canvas.height - gameState.ball.radius; gameState.ball.vy *= -0.5; }

        // Detekce dírek
        gameState.holes.forEach(hole => {
            const dx = gameState.ball.x - hole.x;
            const dy = gameState.ball.y - hole.y;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < 20) { // Kulička "spadla" do dírky
                if (hole.type === 'goal' && hole.owner !== gameState.currentPlayer) {
                    // GÓL!
                    gameState.score[gameState.currentPlayer]++;
                    saveGame();
                    updateUI();
                    statusText.innerText = "GÓÓÓL!";
                    resetBall();
                    startCountdown(3);
                } else if (hole.type === 'trap') {
                    // Past - střídání stran
                    gameState.currentPlayer = gameState.currentPlayer === 0 ? 1 : 0;
                    saveGame();
                    updateUI();
                    statusText.innerText = "ZTRÁTA MÍČE!";
                    subText.innerText = "Předej telefon druhému hráči";
                    resetBall();
                    startCountdown(5);
                }
            }
        });
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Hřiště (PavlatkoLabs styl)
    ctx.strokeStyle = "rgba(255,255,255,0.5)";
    ctx.lineWidth = 2;
    ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);
    ctx.beginPath();
    ctx.moveTo(20, canvas.height/2); ctx.lineTo(canvas.width-20, canvas.height/2);
    ctx.stroke();

    // Dírky
    gameState.holes.forEach(hole => {
        ctx.fillStyle = hole.type === 'goal' ? '#111' : '#000';
        ctx.beginPath();
        ctx.arc(hole.x, hole.y, 22, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = hole.type === 'goal' ? 'gold' : '#444';
        ctx.stroke();
    });

    // Kulička (Míč)
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(gameState.ball.x, gameState.ball.y, gameState.ball.radius, 0, Math.PI*2);
    ctx.fill();
    // Odlesk na míči
    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.beginPath();
    ctx.arc(gameState.ball.x - 4, gameState.ball.y - 4, 3, 0, Math.PI*2);
    ctx.fill();
}

startBtn.addEventListener('click', () => {
    // Vyžádání povolení pro iOS
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
            .then(state => { if (state === 'granted') startGame(); })
            .catch(console.error);
    } else {
        startGame();
    }
});

function startGame() {
    const wasSaved = loadGame();
    if (wasSaved) {
        statusText.innerText = "Hra obnovena";
        subText.innerText = "Připrav se...";
        startCountdown(3);
    } else {
        resetBall();
        startCountdown(3);
    }
    requestAnimationFrame(update);
}

window.addEventListener('resize', resize);
resize();

</script>
</body>
</html>
