<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GT Race (PavlatkoLabs)</title>
    <style>
        :root { --lcd-bg: #9ea78d; --lcd-ink: #1a1a1a; }
        body { 
            background: #1a1a1a; margin: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none;
        }
        #game-container {
            position: relative; width: 100%; max-width: 450px; height: 100vh;
            background: var(--lcd-bg); border-left: 8px solid #333; border-right: 8px solid #333;
        }
        canvas { display: block; width: 100%; height: 100%; }
        .ui-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: var(--lcd-bg); z-index: 20; text-align: center;
        }
        button {
            background: var(--lcd-ink); color: var(--lcd-bg); border: none;
            padding: 15px 30px; margin: 10px; cursor: pointer; font-weight: bold; font-size: 1.2rem;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
        }
        .signature {
            position: absolute; bottom: 8px; right: 11px; font-size: 11px;
            color: rgba(0,0,0,0.4); pointer-events: none;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu-screen" class="ui-screen">
		<h1 style="font-size: 3rem; margin: 0;">GT RACE</h1>
		<p style="margin-top: 5px; font-weight: bold;">1.08</p>
		<button id="resume-btn" class="hidden" onclick="handleResume()">CONTINUE</button>
		<button onclick="handleStartNew()">NEW GAME</button>
		<p id="last-score-menu" style="font-size: 1.2rem; margin-top: 20px; margin-bottom: 0;">LAST SCORE: 0</p>
		<p id="high-score-menu" style="font-size: 1.2rem; margin-top: 5px;">RECORD: 0</p>
		<div class="signature"><strong>Pavlatko</strong>Labs</div>
	</div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const menuScreen = document.getElementById('menu-screen');
    const resumeBtn = document.getElementById('resume-btn');
    const highScoreMenu = document.getElementById('high-score-menu');

	const lastScoreMenu = document.getElementById('last-score-menu');
	let lastScore = localStorage.getItem('gt_lastScore') || 0;
	lastScoreMenu.innerText = `LAST SCORE: ${lastScore}`;

    const TARGET_FPS = 60;
    let lastTime = 0;

    const START_SPEED = 500; 
    let gameOverTimer = 0;
    let gameActive = false;
    let isGameOver = false;
    let score = 0;
    let speed = START_SPEED;
    let lives = 3;
    let roadOffset = 0;
    
    // Upravit objekt player
	let player = { 
		lane: 1, x: 0, y: 0, targetX: 0, 
		baseY: 0, targetY: 0, // Nové vlastnosti pro svislý pohyb
		invul: 0, color: "#B1160A",
		rotation: 0, spinTimer: 0, spinDirection: 1 
	};

	// Pomocná proměnná pro stav kláves
	const keys = { ArrowUp: false, w: false };
    
    let enemies = [];
    let oilSlicks = []; 
    let highScore = localStorage.getItem('gt_highScore') || 0;
    let audioCtx = null;
    let levelUpTimer = 0;
	let isPaused = false;
	let isTouchingUpperPart = false;
	const pauseBtnArea = { x: 0, y: 15, w: 50, h: 40 }; // Pozice a velikost tlačítka

    highScoreMenu.innerText = `RECORD: ${highScore}`;
    checkSavedGame();

	function drawGameSceneStatic() {
		// Vykreslíme auto hráče
		drawGTCar(player.x, player.y, player.color, 1, player.rotation);
		// Vykreslíme soupeře
		enemies.forEach(en => drawGTCar(en.x, en.y, en.color, 1, en.rotation));
		// Vykreslíme olejové skvrny
		oilSlicks.forEach(slick => drawOilSlick(slick));
	}

	function drawRoad() {
		ctx.strokeStyle = "#1a1a1a";
		ctx.lineWidth = 4;
		ctx.setLineDash([40, 20]);
		ctx.lineDashOffset = -roadOffset;
		ctx.beginPath();
		ctx.moveTo(6, 0); ctx.lineTo(6, canvas.height);
		ctx.moveTo(canvas.width - 6, 0); ctx.lineTo(canvas.width - 6, canvas.height);
		ctx.stroke();

		ctx.setLineDash([30, 50]);
		ctx.lineDashOffset = -roadOffset;
		ctx.lineWidth = 1;
		ctx.beginPath();
		ctx.moveTo(canvas.width / 3, 0); ctx.lineTo(canvas.width / 3, canvas.height);
		ctx.moveTo((canvas.width / 3) * 2, 0); ctx.lineTo((canvas.width / 3) * 2, canvas.height);
		ctx.stroke();
	}

	function drawUI() {
		pauseBtnArea.x = canvas.width - 70;
		ctx.strokeStyle = "#1a1a1a";
		ctx.lineWidth = 2;
		ctx.setLineDash([]);
		ctx.strokeRect(pauseBtnArea.x, pauseBtnArea.y, pauseBtnArea.w, pauseBtnArea.h);

		ctx.fillStyle = "#1a1a1a";
		ctx.textAlign = "center";
		ctx.font = "bold 24px Courier New";
		ctx.fillText(isPaused ? "▶" : "||", pauseBtnArea.x + 25, pauseBtnArea.y + 28);

		ctx.textAlign = "left";
		ctx.font = "bold 18px Courier New";
		ctx.fillText(`SCORE: ${score}`, 20, 30);
		ctx.fillText(`BEST:  ${highScore}`, 20, 55);
		let lifeStr = "";
		for(let i=0; i<lives; i++) lifeStr += "■ ";
		ctx.fillText(`LIVES: ${lifeStr}`, 20, 80);
	}

    function checkSavedGame() {
        if (localStorage.getItem('ukládání_postupu')) resumeBtn.classList.remove('hidden');
        else resumeBtn.classList.add('hidden');
    }

    function resize() {
		canvas.width = canvas.offsetWidth;
		canvas.height = canvas.offsetHeight;
		player.baseY = canvas.height - 140; // Základní pozice
		player.targetY = player.baseY;      // Aktuální cíl
		player.y = player.baseY;
		updatePlayerPos(true);
	}
    window.addEventListener('resize', resize);
    resize();

    function updatePlayerPos(immediate = false) {
        const laneWidth = canvas.width / 3;
        player.targetX = (player.lane * laneWidth) + (laneWidth / 2) - 30;
        if (immediate) player.x = player.targetX;
    }

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playTone(freq, dur) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function playSkidSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    function handleStartNew() {
        initAudio();
        if (localStorage.getItem('ukládání_postupu') && !confirm("Overwrite current game?")) return;
        isPaused = false; 
        score = 0; speed = START_SPEED; lives = 3; enemies = []; oilSlicks = []; player.lane = 1; isGameOver = false;
        player.rotation = 0; player.spinTimer = 0;
        updatePlayerPos(true);
        startWithFullscreen();
    }

    function handleResume() {
        initAudio();
        const s = JSON.parse(localStorage.getItem('ukládání_postupu'));
        if (s) {
            player.lane = s.player.lane;
            player.x = s.player.x;
            player.invul = 120; // Dočasná nesmrtelnost po načtení
            score = s.score; 
            speed = s.speed; 
            lives = s.lives !== undefined ? s.lives : 3;
            enemies = []; // Vyčistíme staré nepřátele pro bezpečný start
            oilSlicks = [];
            isGameOver = false;
            isPaused = false; 
            startWithFullscreen();
        }
    }

    function startWithFullscreen() {
        document.documentElement.requestFullscreen().catch(() => {});
        gameActive = true;
        menuScreen.classList.add('hidden');
        setTimeout(resize, 100);
        lastTime = performance.now(); 
        requestAnimationFrame(gameLoop);
    }

	function drawGTCar(x, y, color, opacity = 1, rotation = 0) {
		ctx.save();
		ctx.translate(x + 30, y + 45);
		ctx.rotate(rotation);
		ctx.translate(-(x + 30), -(y + 45));
		ctx.globalAlpha = opacity;

		const p = 4;

		// 1. STÍN A KOLA
		ctx.fillStyle = "rgba(0,0,0,0.2)";
		ctx.fillRect(x + 1*p, y + 2*p, 13*p, 18*p);
		ctx.fillStyle = "#1a1a1a";
		ctx.fillRect(x + 1*p, y + 2*p, 3*p, 4*p);
		ctx.fillRect(x + 11*p, y + 2*p, 3*p, 4*p);
		ctx.fillRect(x + 1*p, y + 13*p, 3*p, 4*p);
		ctx.fillRect(x + 11*p, y + 13*p, 3*p, 4*p);

		// 2. HLAVNÍ KAROSERIE
		ctx.fillStyle = color;
		ctx.fillRect(x + 2*p, y + 1*p, 11*p, 18*p);
		ctx.fillStyle = "rgba(0,0,0,0.1)";
		ctx.fillRect(x + 4*p, y + 2*p, 7*p, 6*p);
		
		// 3. STŘECHA
		ctx.fillStyle = color;
		ctx.fillRect(x + 4*p, y + 10*p, 7*p, 5*p);

		// 4. DYNAMICKÁ BARVA PRUHŮ (Novinka)
		// ZÁVODNÍ PRUHY - Dynamická barva pro kontrast
		const lightColors = ["#FFF", "#FFFFFF", "#EEEEEE", "#FFEB3B", "#FFFF00", "#CCFF00"];
		if (lightColors.includes(color.toUpperCase())) {
			ctx.fillStyle = "rgba(0,0,0,0.4)"; // Černé pruhy jen pro skutečně světlé
		} else {
			ctx.fillStyle = "rgba(255,255,255,0.3)"; // Bílé pruhy pro zbytek (včetně tvé zelené)
		}

        // Vykreslení pruhů (s tvou širší mezerou)
        ctx.fillRect(x + 6.05*p, y + 1*p, 0.8*p, 17*p); 
        ctx.fillRect(x + 7.9*p, y + 1*p, 0.8*p, 17*p);
		
		// 5. OKNA PŘES PRUHY
		ctx.fillStyle = "#333";
		ctx.fillRect(x + 4*p, y + 8*p, 7*p, 2*p);     // Čelní sklo
		ctx.fillRect(x + 4*p, y + 15*p, 7*p, 1.5*p);  // Zadní okno

		// 6. SVĚTLA A KŘÍDLO
		ctx.fillStyle = "#fff"; 
		ctx.fillRect(x + 2.5*p, y + 1*p, 2*p, 1*p);
		ctx.fillRect(x + 10.5*p, y + 1*p, 2*p, 1*p);
		ctx.fillStyle = "#ff0000"; 
		ctx.fillRect(x + 2.5*p, y + 18.5*p, 2*p, 0.5*p);
		ctx.fillRect(x + 10.5*p, y + 18.5*p, 2*p, 0.5*p);

		ctx.fillStyle = "#1a1a1a";
		ctx.fillRect(x + 1.5*p, y + 18*p, 12*p, 1.5*p); // Křídlo
		ctx.fillRect(x + 2*p, y + 16.5*p, 1*p, 2.5*p);  
		ctx.fillRect(x + 12*p, y + 16.5*p, 1*p, 2.5*p); 

		ctx.restore();
	}

    function drawOilSlick(slick) {
		ctx.fillStyle = "rgba(0, 0, 0, 0.8)"; // Tvá nová černá barva
		slick.blobs.forEach(b => {
			ctx.beginPath();
			// Vykreslí jednotlivé části skvrny kolem jejího středu
			ctx.ellipse(slick.x + 30 + b.ox, slick.y + 30 + b.oy, b.rx, b.ry, Math.PI / 4, 0, Math.PI * 2);
			ctx.fill();
		});
	}

    function drawGameOver() {
        ctx.fillStyle = "rgba(158, 167, 141, 0.9)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#1a1a1a";
        ctx.font = "bold 40px Courier New";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 40);
        ctx.font = "bold 20px Courier New";
        ctx.fillText(`SCORE: ${score}`, canvas.width / 2, canvas.height / 2 + 10);
        ctx.fillText(`RECORD: ${highScore}`, canvas.width / 2, canvas.height / 2 + 40);
        ctx.font = "10px Courier New";
        ctx.fillText("PavlatkoLabs", canvas.width / 2, canvas.height - 20);
        ctx.textAlign = "left";
    }

	function getRandomColor() {
		const colors = ["#2E7D32", "#1565C0", "#6A1B9A", "#EF6C00", "#00838F", "#AD1457", "#FFFF00", "#008000", "#FFFFFF"];
		return colors[Math.floor(Math.random() * colors.length)];
	}

    window.addEventListener('keydown', e => {
		// Přidána kontrola isPaused
		if (isGameOver || isPaused || player.spinTimer > 0) return; 
		if (!gameActive) return;
		if (e.key === 'ArrowUp' || e.key === 'w') keys[e.key] = true;
		if (e.key === 'ArrowLeft' && player.lane > 0) { player.lane--; updatePlayerPos(); playTone(300, 0.05); }
		if (e.key === 'ArrowRight' && player.lane < 2) { player.lane++; updatePlayerPos(); playTone(350, 0.05); }
	});

	window.addEventListener('keyup', e => {
		if (e.key === 'ArrowUp' || e.key === 'w') keys[e.key] = false;
	});

	canvas.addEventListener('touchstart', e => {
		if (e.cancelable) e.preventDefault();
		const rect = canvas.getBoundingClientRect();
		const touchX = e.touches[0].clientX - rect.left;
		const touchY = e.touches[0].clientY - rect.top;

		// 1. KONTROLA TLAČÍTKA PAUZY (zůstává stejná)
		if (touchX > pauseBtnArea.x - 10 && touchX < pauseBtnArea.x + pauseBtnArea.w + 10 &&
			touchY > pauseBtnArea.y - 10 && touchY < pauseBtnArea.y + pauseBtnArea.h + 10) {
			
			if (isGameOver) return;
			isPaused = !isPaused;
			if (!isPaused) {
				gameActive = true;
				menuScreen.classList.add('hidden');
				document.documentElement.requestFullscreen().catch(() => {});
			}
			playTone(isPaused ? 400 : 600, 0.05);
			return; 
		}

		if (isPaused || !gameActive || isGameOver || player.spinTimer > 0) return;

		// 2. LOGIKA PRO JÍZDU VPŘED (Horní polovina displeje)
		if (touchY < canvas.height * 0.6) { // Změněno z 0.7 na 0.6
			isTouchingUpperPart = true;
		}

		// 3. LOGIKA PRO ZATÁČENÍ (Spodní polovina displeje)
		if (touchY >= canvas.height * 0.6) { // Změněno z 0.7 na 0.6
			const laneWidth = canvas.width / 3;
			if (touchX < canvas.width / 2 && player.lane > 0) {
				player.lane--; updatePlayerPos(); playTone(300, 0.05);
			} else if (touchX > canvas.width / 2 && player.lane < 2) {
				player.lane++; updatePlayerPos(); playTone(350, 0.05);
			}
		}
	}, {passive: false});

	canvas.addEventListener('touchend', e => {
		// Pokud na displeji nezbyl žádný prst, nebo prsty v horní části, auto se vrací
		if (e.touches.length === 0) {
			isTouchingUpperPart = false;
		} else {
			// Kontrola, zda některý ze zbývajících prstů stále drží horní část
			let stillTouchingTop = false;
			const rect = canvas.getBoundingClientRect();
			for (let i = 0; i < e.touches.length; i++) {
				if (e.touches[i].clientY - rect.top < canvas.height * 0.6) { // Změněno z 0.7 na 0.6
					stillTouchingTop = true;
					break;
				}
			}
			isTouchingUpperPart = stillTouchingTop;
		}
	});

	canvas.addEventListener('mousedown', e => {
		const rect = canvas.getBoundingClientRect();
		const mouseX = e.clientX - rect.left;
		const mouseY = e.clientY - rect.top;

		// 1. KONTROLA TLAČÍTKA PAUZY (musí být VŽDY přístupná)
		if (mouseX > pauseBtnArea.x - 10 && mouseX < pauseBtnArea.x + pauseBtnArea.w + 10 &&
			mouseY > pauseBtnArea.y - 10 && mouseY < pauseBtnArea.y + pauseBtnArea.h + 10) {
			
			if (isGameOver) return; // Na Game Over obrazovce pauza nefunguje

			isPaused = !isPaused;
			// Pokud zapínáme hru z menu přes pauzu, musíme aktivovat i gameActive
			if (!isPaused) {
				gameActive = true;
				menuScreen.classList.add('hidden');
				document.documentElement.requestFullscreen().catch(() => {});
			}
			playTone(isPaused ? 400 : 600, 0.05);
			return; 
		}

		// 2. OSTATNÍ KLIKNUTÍ (pohyb atd.)
		if (isGameOver || !gameActive || isPaused) return; 
		// ... (zbytek tvé logiky pro kliknutí do stran, pokud ji tam máš)
	});

	function gameLoop(currentTime) {
		if (!gameActive && !isGameOver) return;
		if (!currentTime) currentTime = performance.now();

		if (isPaused) {
			lastTime = currentTime;
			ctx.clearRect(0, 0, canvas.width, canvas.height); 
			drawRoad();            // <--- TADY PŘIDÁNO: Silnice při pauze
			drawGameSceneStatic(); 
			drawUI();              
			requestAnimationFrame(gameLoop);
			return;
		}

		const deltaTime = Math.min((currentTime - lastTime) / 1000, 0.1);
		const dtMultiplier = deltaTime * TARGET_FPS;
		lastTime = currentTime;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (isGameOver) {
            drawGameOver();
            gameOverTimer -= dtMultiplier;
            if (gameOverTimer <= 0) {
				isGameOver = false; 
				gameActive = false;
				
				// Uložíme poslední skóre do paměti a aktualizujeme text v menu
				lastScore = score;
				localStorage.setItem('gt_lastScore', lastScore);
				lastScoreMenu.innerText = `LAST SCORE: ${lastScore}`;

				// --- TADY JE TA OPRAVA ---
				// Aktualizujeme i zobrazení rekordu v menu pro případ, že ho hráč právě překonal
				highScoreMenu.innerText = `RECORD: ${highScore}`;
				// -------------------------
				
				menuScreen.classList.remove('hidden');
				checkSavedGame();
			}
            requestAnimationFrame(gameLoop);
            return;
        }

        roadOffset += speed * deltaTime;
		drawRoad(); // Tímto jedním řádkem nahradíš celé to dlouhé kreslení silnice

        // LOGIKA SMYKU HRÁČE
        if (player.spinTimer > 0) {
            player.spinTimer -= deltaTime;
            player.rotation += (Math.PI * 4 * deltaTime) * player.spinDirection;
            if (player.spinTimer <= 0) {
                player.spinTimer = 0;
                player.rotation = 0;
            }
        }

		// Výpočet vertikálního cíle (Klávesnice + Dotyk)
		if (keys.ArrowUp || keys.w || isTouchingUpperPart) {
			player.targetY = canvas.height / 2; // Cíl: polovina obrazovky
		} else {
			player.targetY = player.baseY;      // Cíl: návrat dolů
		}

		// Lineární plynulý pohyb (trvá cca 1 sekundu z klidu do max. pozice)
		const distanceToTravel = Math.abs(player.baseY - (canvas.height / 1.8));
		const vSpeed = distanceToTravel * deltaTime; // Dráha za sekundu * čas snímku

		if (player.y > player.targetY) {
			// Jedeme vpřed
			player.y = Math.max(player.targetY, player.y - vSpeed);
		} else if (player.y < player.targetY) {
			// Vracíme se zpět
			player.y = Math.min(player.targetY, player.y + vSpeed);
		}

        player.x += (player.targetX - player.x) * (0.15 * dtMultiplier);
		// Auto-save každých 30 snímků (cca 0.5s při 60FPS)
        if (gameActive && score > 0 && Math.floor(roadOffset / 10) % 30 === 0) {
            const gameState = {
                player: { lane: player.lane, x: player.x, invul: player.invul },
                score: score,
                speed: speed,
                lives: lives,
                enemies: enemies.map(en => ({...en})) // Kopie nepřátel
            };
            localStorage.setItem('ukládání_postupu', JSON.stringify(gameState));
        }
        drawGTCar(player.x, player.y, player.color, player.invul > 0 && Math.floor(Date.now()/100)%2 ? 0.5 : 1, player.rotation);
        if (player.invul > 0) player.invul -= dtMultiplier;

        // GENEROVÁNÍ OLEJE - s unikátním tvarem pro každou skvrnu
		if (Math.random() < (0.005 * dtMultiplier)) {
			const lane = Math.floor(Math.random() * 3);
			const blobs = [];
			// Každá skvrna se skládá ze 3 až 5 náhodných částí
			const count = 3 + Math.floor(Math.random() * 3);
			for(let i = 0; i < count; i++) {
				blobs.push({
					ox: (Math.random() - 0.5) * 30, // náhodný posun X
					oy: (Math.random() - 0.5) * 20, // náhodný posun Y
					rx: 10 + Math.random() * 15,   // náhodný poloměr X
					ry: 5 + Math.random() * 10     // náhodný poloměr Y
				});
			}
			oilSlicks.push({ 
				x: (lane * (canvas.width/3)) + (canvas.width/6) - 30, 
				y: -100,
				blobs: blobs 
			});
		}

        // ZPRACOVÁNÍ OLEJE
        for (let i = oilSlicks.length - 1; i >= 0; i--) {
            let slick = oilSlicks[i];
            slick.y += speed * deltaTime; // Olej jede stejně rychle jako čáry
            drawOilSlick(slick);
            
            // Kolize hráče s olejem
            if (player.spinTimer === 0 && Math.abs(slick.x - player.x) < 40 && Math.abs(slick.y - player.y) < 50) {
                player.spinTimer = 0.5;
                player.spinDirection = Math.random() < 0.5 ? 1 : -1;
                playSkidSound();
            }
            if (slick.y > canvas.height) oilSlicks.splice(i, 1);
        }

        // GENEROVÁNÍ NEPŘÁTEL
        if (Math.random() < (0.04 * dtMultiplier) && (enemies.length === 0 || enemies[0].y > 150)) {
            let possibleLanes = [0, 1, 2];
            let count = Math.random() < 0.3 ? 2 : 1; 
            for(let i=0; i<count; i++) {
                const idx = Math.floor(Math.random() * possibleLanes.length);
                const lane = possibleLanes.splice(idx, 1)[0];
                enemies.unshift({ 
                    x: (lane * (canvas.width/3)) + (canvas.width/6) - 30, 
                    y: -120, 
                    color: getRandomColor(),
                    rotation: 0,
                    spinTimer: 0,
                    spinDirection: 1
                });
            }
        }

        // SOUPEŘI
        for (let i = enemies.length - 1; i >= 0; i--) {
            let en = enemies[i];
            en.y += (speed * 0.5) * deltaTime;

            // Logika smyku soupeře
            if (en.spinTimer > 0) {
                en.spinTimer -= deltaTime;
                en.rotation += (Math.PI * 4 * deltaTime) * en.spinDirection;
                if (en.spinTimer <= 0) {
                    en.spinTimer = 0;
                    en.rotation = 0;
                }
            } else {
                // Kontrola kolize soupeře s olejem
                for (let slick of oilSlicks) {
                    if (Math.abs(slick.x - en.x) < 40 && Math.abs(slick.y - en.y) < 50) {
                        en.spinTimer = 0.5;
                        en.spinDirection = Math.random() < 0.5 ? 1 : -1;
                        break; 
                    }
                }
            }

            drawGTCar(en.x, en.y, en.color, 1, en.rotation); 

            // Upraveno na 80, aby kolize odpovídala prodloužené karoserii
			if (player.invul <= 0 && Math.abs(en.x - player.x) < 45 && Math.abs(en.y - player.y) < 80) {
                lives--;
                playTone(150, 0.4);
				if (lives <= 0) {
                    isGameOver = true;
                    gameOverTimer = 150; 
                    localStorage.removeItem('ukládání_postupu');
                    break;
                } else {
                    player.invul = 120; enemies = []; break; 
                }
            }

            if (en.y > canvas.height) { 
                enemies.splice(i, 1); score++; 
                playTone(800, 0.01);
                if (score > highScore) {
                    highScore = score; localStorage.setItem('gt_highScore', highScore);
                }
                if (score > 0 && score % 20 === 0) {
                    speed += (START_SPEED * 0.1); levelUpTimer = 60; playTone(600, 0.1);
                }
                if (score === 200 || (score > 200 && (score - 200) % 100 === 0)) {
                    lives++; playTone(1000, 0.2); levelUpTimer = 60;
                }
            }
        }

		// Výpočet pozice tlačítka vpravo nahoře
		pauseBtnArea.x = canvas.width - 70;

		// Vykreslení rámečku tlačítka
		ctx.strokeStyle = "#1a1a1a";
		ctx.lineWidth = 2;
		ctx.setLineDash([]); // Reset čárkování silnice
		ctx.strokeRect(pauseBtnArea.x, pauseBtnArea.y, pauseBtnArea.w, pauseBtnArea.h);

		ctx.fillStyle = "#1a1a1a";
		ctx.textAlign = "center";
		ctx.font = "bold 24px Courier New";

		if (!isPaused) {
			// Symbol [ II ] - hra běží
			ctx.fillText("||", pauseBtnArea.x + 25, pauseBtnArea.y + 28);
		} else {
			// Symbol [ ▶ ] - hra stojí (staticky a bez blikání)
			ctx.font = "bold 22px Courier New";
			ctx.fillText("▶", pauseBtnArea.x + 25, pauseBtnArea.y + 28);
		}

        // HUD
        ctx.fillStyle = "#1a1a1a";
        ctx.font = "bold 18px Courier New";
        ctx.textAlign = "left";
        ctx.fillText(`SCORE: ${score}`, 20, 30);
        ctx.fillText(`BEST:  ${highScore}`, 20, 55);
        let lifeStr = "";
        for(let i=0; i<lives; i++) lifeStr += "■ ";
        ctx.fillText(`LIVES: ${lifeStr}`, 20, 80);

        if (levelUpTimer > 0) {
            levelUpTimer -= dtMultiplier;
            ctx.font = "bold 30px Courier New";
            ctx.textAlign = "center";
            ctx.fillText("UPGRADE!", canvas.width / 2, canvas.height / 2);
        }

        requestAnimationFrame(gameLoop);

    }

	// Hlídač opuštění fullscreenu - spouští se pouze jednou při načtení stránky
	document.addEventListener('fullscreenchange', () => {
		if (!document.fullscreenElement && gameActive) {
			gameActive = false;
			isPaused = true;
			menuScreen.classList.remove('hidden');
			checkSavedGame();
		}
	});
</script>
</body>
