<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake (PavlatkoLabs)</title>
    <style>
        body {
            background-color: #8da37e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            padding-top: 10px;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            touch-action: none;
        }

        #ui-layer {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 310px;
            margin-bottom: 10px;
            gap: 5px;
        }

        #score-container {
            font-size: 18px;
            font-weight: bold;
            color: #222;
            text-align: center;
            width: 100%;
        }

        #high-score-container {
            font-size: 14px;
            color: #444;
            margin-bottom: 5px;
        }

        #game-container {
            position: relative;
            border: 5px solid #222;
            background-color: #94ad83;
            width: 300px;
            height: 440px;
        }

        canvas { display: block; background-color: #94ad83; }

        #menu-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(148, 173, 131, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #menu-overlay h1 { color: #222; margin-bottom: 10px; font-size: 24px; text-align: center; }
        
        #menu-records {
            font-size: 13px;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.4;
        }

        .menu-btn {
            background: #222;
            color: #8da37e;
            border: none;
            padding: 15px 40px;
            margin: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 220px;
            border-radius: 5px;
            box-shadow: 0 4px 0px #000;
        }

        .menu-btn:active { transform: translateY(2px); box-shadow: 0 2px 0px #000; }
        #btn-continue { background: #3e5233; color: #fff; display: none; }

        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-areas: ". up ." "left down right";
            gap: 10px;
        }

        button.nav {
            width: 75px; height: 75px;
            background: #333; color: white;
            border: 2px solid #000; border-radius: 50%;
            font-size: 28px; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        #btn-up { grid-area: up; } #btn-left { grid-area: left; }
        #btn-down { grid-area: down; } #btn-right { grid-area: right; }

        #footer-branding {
            margin-top: 20px;
            font-size: 10px;
            opacity: 0.6;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="score-container">Score: <span id="score-val">0</span></div>
        <div id="high-score-container">Record: <span id="high-score-val">0</span></div>
    </div>

    <div id="game-container">
        <div id="menu-overlay">
            <h1>SNAKE 1.2.1</h1>
            <div id="menu-records">
                Records:<br>
                Normal: <span id="rec-easy">0</span> | Hard: <span id="rec-hard">0</span>
            </div>
            <button id="btn-continue" class="menu-btn" onclick="continueGame()">CONTINUE</button>
            <button class="menu-btn" onclick="checkNewGame('easy')">NORMAL</button>
            <button class="menu-btn" onclick="checkNewGame('hard')">HARD</button>
        </div>
        <canvas id="gameCanvas" width="300" height="440"></canvas>
    </div>

    <div class="controls">
        <button class="nav" id="btn-up">▲</button>
        <button class="nav" id="btn-left">◀</button>
        <button class="nav" id="btn-down">▼</button>
        <button class="nav" id="btn-right">▶</button>
    </div>

    <div id="footer-branding"><strong>Pavlatko</strong>Labs</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score-val");
        const highScoreElement = document.getElementById("high-score-val");
        const menuOverlay = document.getElementById("menu-overlay");
        const btnContinue = document.getElementById("btn-continue");
        
        const recEasyMenu = document.getElementById("rec-easy");
        const recHardMenu = document.getElementById("rec-hard");

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            if (type === 'eat') {
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'die') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                oscillator.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'turn') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(450, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.07);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.07);
            }
        }

        const box = 20; 
        let score = 0;
        let gameSpeed = 220; 
        let snake = [{ x: 7 * box, y: 10 * box }];
        let direction = "RIGHT";
        let changingDirection = false;
        let difficulty = 'easy';
        let gameRunning = false;
        let food = { x: 0, y: 0 };

        // Delta Time proměnné
        let lastTime = 0;
        let accumulator = 0;

        function saveGameState() {
            const state = {
                snake, direction, score, gameSpeed, difficulty, food
            };
            localStorage.setItem('snake_save_game', JSON.stringify(state));
        }

        function loadGameState() {
            const saved = localStorage.getItem('snake_save_game');
            if (saved) {
                const state = JSON.parse(saved);
                snake = state.snake;
                direction = state.direction;
                score = state.score;
                gameSpeed = state.gameSpeed;
                difficulty = state.difficulty;
                food = state.food;
                scoreElement.innerHTML = score;
                updateHighScoreDisplay();
                btnContinue.style.display = "block";
                render();
            }
            updateMenuHighScores();
        }

        function clearSave() {
            localStorage.removeItem('snake_save_game');
            btnContinue.style.display = "none";
        }

        function checkNewGame(mode) {
            if (localStorage.getItem('snake_save_game')) {
                if (confirm("Overwrite current game?")) {
                    clearSave();
                    resetGame(mode);
                }
            } else {
                resetGame(mode);
            }
        }

        function resetGame(mode) {
            difficulty = mode;
            score = 0;
            scoreElement.innerHTML = score;
            snake = [{ x: 7 * box, y: 10 * box }];
            direction = "RIGHT";
            gameSpeed = (difficulty === 'hard') ? 150 : 300; 
            food = generateFood();
            updateHighScoreDisplay();
            startGame();
        }

        function continueGame() {
            startGame();
        }

        function updateHighScoreDisplay() {
            const key = `snake_highscore_${difficulty}`;
            let highScore = localStorage.getItem(key) || 0;
            if (score > highScore) {
                highScore = score;
            }
            highScoreElement.innerHTML = highScore;
        }

        function updateMenuHighScores() {
            recEasyMenu.innerHTML = localStorage.getItem('snake_highscore_easy') || 0;
            recHardMenu.innerHTML = localStorage.getItem('snake_highscore_hard') || 0;
        }

        function saveHighScore() {
            const key = `snake_highscore_${difficulty}`;
            const currentHighScore = localStorage.getItem(key) || 0;
            if (score > currentHighScore) {
                localStorage.setItem(key, score);
            }
            updateMenuHighScores();
        }

        function requestFullscreen() {
            const docElm = document.documentElement;
            if (docElm.requestFullscreen) docElm.requestFullscreen();
            else if (docElm.webkitRequestFullScreen) docElm.webkitRequestFullScreen();
        }

        function startGame() {
            gameRunning = true;
            menuOverlay.style.display = "none";
            if (audioCtx.state === 'suspended') audioCtx.resume();
            requestFullscreen();
            updateHighScoreDisplay();
            
            lastTime = performance.now();
            accumulator = 0;
            requestAnimationFrame(gameLoop);
        }

        function stopAndSave() {
            if (gameRunning) {
                gameRunning = false;
                saveGameState();
                saveHighScore();
                menuOverlay.style.display = "flex";
                btnContinue.style.display = "block";
                updateMenuHighScores();
            }
        }

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) stopAndSave();
        });

        function generateFood() {
            let newFood; let isOnSnake;
            do {
                isOnSnake = false;
                newFood = {
                    x: Math.floor(Math.random() * (canvas.width / box)) * box,
                    y: Math.floor(Math.random() * (canvas.height / box)) * box
                };
                for (let part of snake) {
                    if (part.x === newFood.x && part.y === newFood.y) { isOnSnake = true; break; }
                }
            } while (isOnSnake);
            return newFood;
        }

        function gameLoop(currentTime) {
            if (!gameRunning) return;

            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            accumulator += deltaTime;

            // Logika se provede pouze po uplynutí intervalu gameSpeed
            while (accumulator >= gameSpeed) {
                update();
                accumulator -= gameSpeed;
            }

            render();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            changingDirection = false;
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (direction == "LEFT") snakeX -= box;
            if (direction == "UP") snakeY -= box;
            if (direction == "RIGHT") snakeX += box;
            if (direction == "DOWN") snakeY += box;

            if (difficulty === 'hard') {
                if (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height) {
                    gameOver();
                    return;
                }
            } else {
                if (snakeX < 0) snakeX = canvas.width - box;
                else if (snakeX >= canvas.width) snakeX = 0;
                if (snakeY < 0) snakeY = canvas.height - box;
                else if (snakeY >= canvas.height) snakeY = 0;
            }

            let newHead = { x: snakeX, y: snakeY };

            if (collision(newHead, snake)) {
                gameOver();
                return;
            }

            if (snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerHTML = score;
                updateHighScoreDisplay();
                playSound('eat');
                food = generateFood();
            } else {
                snake.pop(); 
            }

            snake.unshift(newHead);
        }

        function gameOver() {
            gameRunning = false;
            saveHighScore();
            clearSave();
            playSound('die');
            setTimeout(() => {
                alert("Game over!\nScore: " + score);
                location.reload();
            }, 100);
        }

        function render() {
            ctx.fillStyle = "#94ad83";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < snake.length; i++) {
                let isHead = (i === 0);
                let isTail = (i === snake.length - 1 && snake.length > 1);
                ctx.fillStyle = isHead ? "#000" : "#222";
                if (isTail) {
                    let padding = 4;
                    ctx.fillRect(snake[i].x + padding/2, snake[i].y + padding/2, box - padding, box - padding);
                } else {
                    ctx.fillRect(snake[i].x, snake[i].y, box, box);
                }
                if (isHead) {
                    ctx.fillStyle = "#94ad83";
                    const eyeSize = 3; const offset = 5;
                    if (direction === "RIGHT") {
                        ctx.fillRect(snake[i].x + box - offset, snake[i].y + 4, eyeSize, eyeSize);
                        ctx.fillRect(snake[i].x + box - offset, snake[i].y + box - 7, eyeSize, eyeSize);
                    } else if (direction === "LEFT") {
                        ctx.fillRect(snake[i].x + offset - eyeSize, snake[i].y + 4, eyeSize, eyeSize);
                        ctx.fillRect(snake[i].x + offset - eyeSize, snake[i].y + box - 7, eyeSize, eyeSize);
                    } else if (direction === "UP") {
                        ctx.fillRect(snake[i].x + 4, snake[i].y + offset - eyeSize, eyeSize, eyeSize);
                        ctx.fillRect(snake[i].x + box - 7, snake[i].y + offset - eyeSize, eyeSize, eyeSize);
                    } else if (direction === "DOWN") {
                        ctx.fillRect(snake[i].x + 4, snake[i].y + box - offset, eyeSize, eyeSize);
                        ctx.fillRect(snake[i].x + box - 7, snake[i].y + box - offset, eyeSize, eyeSize);
                    }
                }
                ctx.strokeStyle = "#94ad83"; ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }
            ctx.fillStyle = "#000"; ctx.fillRect(food.x, food.y, box, box);
        }

        function handleInput(newDir) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (!gameRunning || changingDirection) return;
            const opposites = { 'UP': 'DOWN', 'DOWN': 'UP', 'LEFT': 'RIGHT', 'RIGHT': 'LEFT' };
            if (newDir !== opposites[direction] && newDir !== direction) {
                playSound('turn');
                direction = newDir;
                changingDirection = true;
                // Při změně směru ihned aktualizujeme a resetujeme akumulátor pro plynulost
                update();
                accumulator = 0;
            }
        }

        document.addEventListener("keydown", e => {
            if(e.keyCode == 37) handleInput("LEFT");
            if(e.keyCode == 38) handleInput("UP");
            if(e.keyCode == 39) handleInput("RIGHT");
            if(e.keyCode == 40) handleInput("DOWN");
        });

        document.getElementById("btn-up").onclick = () => handleInput("UP");
        document.getElementById("btn-down").onclick = () => handleInput("DOWN");
        document.getElementById("btn-left").onclick = () => handleInput("LEFT");
        document.getElementById("btn-right").onclick = () => handleInput("RIGHT");

        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        food = generateFood();
        loadGameState();
        render();
    </script>
</body>
</html>
